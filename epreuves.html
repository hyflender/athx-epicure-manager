<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATHX Epicure - Épreuves</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link rel="stylesheet" href="./assets/css/admin-bootstrap.css" />
    <style>
      .zone-scored td:first-child     { border-left: 3px solid var(--gold); }
      .zone-transition td:first-child { border-left: 3px solid rgba(0,0,0,.12); }
      .zone-transition                { opacity: .65; }
      .badge {
        display: inline-block;
        font-size: 10px;
        font-family: var(--mono);
        padding: 1px 6px;
        border-radius: 3px;
        letter-spacing: .05em;
      }
      .badge-scored { background: rgba(245,192,48,.18); color: var(--gold); border: 1px solid rgba(245,192,48,.35); }
      .badge-free   { background: rgba(0,0,0,.06); color: var(--muted); border: 1px solid rgba(0,0,0,.1); }
      .badge-up     { color: #1a7a48; font-size: 11px; }
      .badge-down   { color: #c0392b; font-size: 11px; }
      .notes-cell   { font-size: 11px; color: var(--muted); max-width: 380px; line-height: 1.6; }
      table.zones th,
      table.zones td { padding: 9px 12px; vertical-align: top; }
      .zone-num { font-weight: 700; color: var(--gold); font-size: 17px; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-md navbar-dark border-bottom border-secondary admin-navbar">
      <div class="container-fluid">
        <a class="navbar-brand" href="./index.html"><span class="fw-bold">ATHX</span> <span class="text-secondary" style="font-size:0.88rem">· Athlètes</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#athleteNav" aria-controls="athleteNav" aria-expanded="false" aria-label="Menu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="athleteNav">
          <ul class="navbar-nav ms-md-auto flex-wrap py-2 py-md-0">
            <li class="nav-item"><a class="nav-link" href="./portail.html">Portail</a></li>
            <li class="nav-item"><a class="nav-link" href="./planning.html">Planning</a></li>
            <li class="nav-item"><a class="nav-link active" href="./epreuves.html">Épreuves</a></li>
            <li class="nav-item"><a class="nav-link" href="./classement.html">Classement</a></li>
            <li class="nav-item"><a class="nav-link" href="./athlete.html">Mes résultats</a></li>
            <li class="nav-item"><a class="nav-link text-secondary" href="./admin.html" title="Espace gérant">Espace gérant</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container-fluid px-2 px-sm-3 py-3 py-md-4">
      <section class="card">
        <h2>Structure de la compétition</h2>
        <p class="muted" style="font-size:12px;margin-bottom:16px">
          Zones <span class="badge badge-scored">SCORE</span> contribuent au classement par système de rangs (somme des rangs — le plus bas gagne).
        </p>
        <div class="table-responsive">
          <table class="zones w-100">
            <thead>
              <tr>
                <th style="width:50px">Zone</th>
                <th style="width:160px">Nom</th>
                <th style="width:72px">Durée</th>
                <th style="width:72px">Time cap</th>
                <th style="width:150px">Score</th>
                <th>Détails</th>
              </tr>
            </thead>
            <tbody id="event-tbody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="./assets/js/data.js"></script>
    <script>
      const tbody = document.querySelector("#event-tbody");

      function render() {
        const state  = AthxStore.loadState();
        const events = [...state.events].sort((a, b) => a.order - b.order);
        tbody.innerHTML = "";
        events.forEach((ev) => {
          const tr = document.createElement("tr");
          tr.className = `zone-row ${ev.scored ? "zone-scored" : "zone-transition"}`;
          const scoreBadge = ev.scored
            ? `<span class="badge badge-scored">SCORE</span>
               <span style="margin-left:5px">${ev.higherIsBetter
                 ? '<span class="badge-up">▲ max</span>'
                 : '<span class="badge-down">▼ min</span>'}</span>
               <br><span style="font-size:11px;color:var(--muted)">${ev.scoreFormat}</span>`
            : `<span class="badge badge-free">transition</span>`;
          tr.innerHTML = `
            <td class="zone-num">${ev.zone}</td>
            <td style="font-weight:600">${ev.name}</td>
            <td>${ev.durationMinutes ? `${ev.durationMinutes} min` : "—"}</td>
            <td>${ev.timeCapMinutes ? `${ev.timeCapMinutes} min` : "—"}</td>
            <td>${scoreBadge}</td>
            <td class="notes-cell">${ev.notes || "—"}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      AthxStore.whenCloudReady()
        .then(() => render())
        .catch((err) => alert(`Cloud indisponible: ${err.message || err}`));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>
