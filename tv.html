<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ATHX Epicure · Live TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #0A0A0A;
  --surface: #141414;
  --card:    #1C1C1C;
  --border:  #2A2A2A;
  --text:    #FFFFFF;
  --muted:   #888888;
  --faint:   #333333;
  --volt:    #C6FF00;
  --volt-dim:rgba(198,255,0,.10);
  --sans: "Inter", system-ui, sans-serif;
  --mono: "JetBrains Mono", monospace;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
body { font-family:var(--sans); color:var(--text); -webkit-font-smoothing:antialiased; }

/* ── LOADER ───────────────────────────────────────────────────────── */
#loader {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:999; gap:20px; transition:opacity .6s;
}
#loader.hidden { opacity:0; pointer-events:none; }
.ld-title { font-size:56px; font-weight:900; color:var(--volt); letter-spacing:-.02em; text-transform:uppercase; }
.ld-sub   { font-size:14px; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; }
.ld-bar   { width:180px; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
.ld-fill  { height:100%; background:var(--volt); border-radius:2px; animation:ldFill 1.4s ease forwards; }
@keyframes ldFill { to { width:100%; } }

/* ── ROOT LAYOUT ──────────────────────────────────────────────────── */
#app {
  width:100vw; height:100vh;
  display:grid;
  grid-template-rows: clamp(48px,6vh,72px) 1fr auto;
}

/* Vue unique — plus de slides */
#live-view {
  display:grid;
  grid-template-rows: 1fr clamp(115px,16vh,155px);
  overflow:hidden; min-height:0;
}

/* ── HEADER ───────────────────────────────────────────────────────── */
#hdr {
  background:#0D0D0D; border-bottom:2px solid var(--border);
  display:flex; align-items:center; padding:0 clamp(14px,2vw,32px); gap:0;
}
.hdr-logo {
  font-size:clamp(16px,1.6vw,24px); font-weight:900; letter-spacing:.12em;
  text-transform:uppercase; color:var(--volt); flex-shrink:0;
}
.hdr-sep  { width:1px; height:22px; background:var(--border); margin:0 clamp(12px,1.4vw,22px); flex-shrink:0; }
.hdr-comp {
  font-size:clamp(11px,1.1vw,16px); font-weight:600; color:var(--muted); flex:1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  min-width:0;
}
.hdr-sync { font-size:clamp(9px,.8vw,11px); font-family:var(--mono); color:var(--faint); margin-right:clamp(10px,1vw,16px); }
.hdr-clock{ font-family:var(--mono); font-size:clamp(24px,3vw,42px); font-weight:700; color:var(--volt); letter-spacing:.06em; }
.hdr-fs {
  width:clamp(28px,3vh,38px); height:clamp(28px,3vh,38px); border-radius:6px; margin-left:8px;
  border:1px solid var(--border); background:var(--card);
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(11px,1.1vw,15px); cursor:pointer; transition:all .15s; flex-shrink:0;
}
.hdr-fs:hover { border-color:var(--volt); color:var(--volt); }


/* ── NEXT DEPARTURE BANNER ── */


/* ── TOAST ── */
#toast {
  position:fixed; bottom:180px; right:28px; z-index:500;
  display:flex; flex-direction:column; gap:8px; pointer-events:none;
}
.toast-item {
  background:#1C1C1C; border:1px solid var(--volt);
  border-radius:12px; padding:14px 22px;
  display:flex; align-items:center; gap:14px;
  box-shadow:0 0 24px rgba(198,255,0,.2);
  animation:toastIn .4s ease forwards;
  min-width:260px; max-width:400px;
}
@keyframes toastIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
@keyframes toastOut{ from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(30px)} }
.toast-item.out { animation:toastOut .3s ease forwards; }
.toast-icon { font-size:22px; flex-shrink:0; }
.toast-body { flex:1; min-width:0; }
.toast-title{ font-size:14px; font-weight:700; color:var(--volt); }
.toast-desc { font-size:13px; color:var(--muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ══════════════════════════════════════════════════════════════
   SCORE PILLS dans les chips athlètes (vue live)
══════════════════════════════════════════════════════════════ */
.ath-scores-row {
  display:flex; gap:clamp(3px,.4vw,6px); flex-wrap:nowrap;
  margin-top:clamp(5px,.7vh,8px); overflow:hidden;
}
.ath-score-pill {
  display:flex; align-items:center; gap:4px;
  padding:clamp(3px,.4vh,5px) clamp(5px,.6vw,9px);
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
  border-radius:6px; flex:1; min-width:0; overflow:hidden;
}
.ath-score-pill.current-zone {
  border-color:color-mix(in srgb,var(--zc) 60%,transparent);
  background:color-mix(in srgb,var(--zc) 10%,transparent);
}
.ath-score-pill.scored {
  border-color:rgba(255,255,255,.18); background:rgba(255,255,255,.06);
}
.asp-icon { font-size:clamp(9px,.9vw,12px); flex-shrink:0; line-height:1; }
.asp-body { display:flex; flex-direction:column; gap:0; min-width:0; flex:1; }
.asp-val  {
  font-family:var(--mono); font-size:clamp(10px,1vw,13px); font-weight:800;
  line-height:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  color:var(--text);
}
.asp-val.empty { color:var(--faint); }
.asp-lbl { font-size:clamp(6px,.55vw,8px); color:rgba(255,255,255,.3); text-transform:uppercase; letter-spacing:.05em; font-family:var(--mono); white-space:nowrap; }

/* ── MIDDLE ──────────────────────────────────────────────────────── */
#middle {
  display:grid;
  grid-template-columns: 1fr clamp(240px,28vw,420px);
  overflow:hidden; min-height:0;
}

/* ── ZONES PANEL ─────────────────────────────────────────────────── */
#zones-panel {
  padding:clamp(10px,1.2vh,18px) clamp(10px,1vw,16px) clamp(10px,1.2vh,18px) clamp(16px,1.8vw,28px);
  display:grid;
  grid-template-columns: 1fr 1fr;
  grid-auto-rows: min-content;
  gap:clamp(6px,.8vh,12px);
  overflow-y:auto; min-height:0; align-content:start;
}

/* Zone inactive : ligne ultra compacte (transition vide = cachée via JS) */
.zone-row {
  background:rgba(255,255,255,.025); border:1px solid rgba(255,255,255,.07); border-radius:6px;
  display:flex; align-items:center; gap:clamp(7px,.7vw,12px);
  padding:clamp(6px,.7vh,10px) clamp(10px,1vw,16px); overflow:hidden;
  opacity:.6;
}
.zone-row-icon { font-size:clamp(12px,1.2vw,17px); flex-shrink:0; }
.zone-row-num  { font-size:clamp(7px,.6vw,9px); font-family:var(--mono); font-weight:700; letter-spacing:.08em; color:var(--faint); flex-shrink:0; }
.zone-row-name { font-size:clamp(10px,1vw,14px); font-weight:800; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.zbadge { font-size:clamp(7px,.6vw,9px); font-family:var(--mono); font-weight:700; letter-spacing:.05em; padding:1px 6px; border-radius:20px; text-transform:uppercase; flex-shrink:0; }
.zbadge-scored   { background:var(--volt-dim); color:var(--volt); border:1px solid rgba(198,255,0,.2); }
.zbadge-unscored { background:rgba(255,255,255,.03); color:var(--faint); border:1px solid rgba(255,255,255,.06); }
.zone-row-dur { font-size:clamp(7px,.65vw,10px); color:var(--faint); font-family:var(--mono); flex-shrink:0; }

/* Zone active : carte expandée — span 2 colonnes */
.zone-card {
  grid-column: 1 / -1;
  background:var(--card); border:1px solid var(--zc, #555);
  border-left:4px solid var(--zc, #555);
  border-radius:10px; flex-shrink:0;
  box-shadow:0 0 30px rgba(0,0,0,.5), 0 0 60px color-mix(in srgb,var(--zc,transparent) 8%,transparent);
  overflow:hidden;
}

/* Header zone : icône | nom | badge · timer à droite */
.zone-card-header {
  display:flex; align-items:center; gap:clamp(10px,1.2vw,16px);
  padding:clamp(8px,1vh,13px) clamp(12px,1.2vw,18px);
  background:color-mix(in srgb, var(--zc,transparent) 7%, #111);
  position:relative;
}
.zone-card-icon {
  width:clamp(32px,3.5vh,46px); height:clamp(32px,3.5vh,46px); border-radius:8px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:clamp(16px,1.8vh,24px);
  background:color-mix(in srgb,var(--zc) 18%,transparent);
  border:1px solid color-mix(in srgb,var(--zc) 30%,transparent);
}
.zone-card-info { flex:1; min-width:0; }
.zone-card-num  { font-size:clamp(8px,.7vw,10px); font-family:var(--mono); font-weight:700; letter-spacing:.1em; color:color-mix(in srgb,var(--zc) 60%,var(--muted)); text-transform:uppercase; }
.zone-card-name { font-size:clamp(14px,1.6vw,21px); font-weight:900; text-transform:uppercase; letter-spacing:.04em; line-height:1.1; }
.zone-card-meta { display:flex; align-items:center; gap:clamp(6px,.8vw,10px); margin-left:auto; }
.zone-card-dur  { font-size:clamp(9px,.8vw,11px); color:var(--muted); font-family:var(--mono); }

/* Timer restant — encadré proéminent à droite */
.zone-timer {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,.35); border:1px solid color-mix(in srgb,var(--zc) 25%,transparent);
  border-radius:8px; padding:clamp(4px,.5vh,7px) clamp(10px,1.2vw,16px);
  flex-shrink:0;
}
.zone-timer-val {
  font-family:var(--mono); font-size:clamp(16px,2vw,26px); font-weight:900;
  color:var(--zc); line-height:1; letter-spacing:.04em;
}
.zone-timer-lbl {
  font-size:clamp(7px,.6vw,9px); font-family:var(--mono); color:var(--muted);
  text-transform:uppercase; letter-spacing:.12em; margin-top:1px;
}

/* Barre de progression — fine, sous le header */
.zone-prog      { height:2px; background:rgba(255,255,255,.06); }
.zone-prog-fill { height:100%; background:var(--zc); transition:width 1s linear;
  box-shadow:0 0 8px var(--zc); }

/* Athletes grid */
.zone-athletes { display:grid; grid-template-columns:repeat(auto-fill,minmax(clamp(200px,20vw,320px),1fr)); gap:clamp(5px,.6vh,9px); padding:clamp(8px,1vh,12px) clamp(10px,1.1vw,16px) clamp(10px,1.2vh,14px); }
.ath-chip {
  display:flex; flex-direction:column; gap:0;
  background:rgba(255,255,255,.04); border:1px solid color-mix(in srgb,var(--zc) 25%,transparent);
  border-radius:8px; padding:clamp(8px,.9vh,12px) clamp(10px,1vw,14px);
}
.ath-chip-top { display:flex; align-items:center; gap:clamp(8px,.9vw,12px); }
.ath-chip-info { flex:1; min-width:0; }
.ath-chip-name {
  font-size:clamp(13px,1.5vw,20px); font-weight:800; line-height:1.15;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ath-chip-name em { font-style:normal; font-weight:500; opacity:.75; font-size:.85em; }
.ath-chip-sub { display:flex; align-items:center; gap:6px; margin-top:3px; }
.ath-chip-cat {
  font-size:clamp(7px,.62vw,9px); font-weight:700; font-family:var(--mono);
  padding:2px 6px; border-radius:8px; text-transform:uppercase;
}
.cc-lite { background:rgba(96,165,250,.15); color:#60A5FA; }
.cc-athx { background:var(--volt-dim); color:var(--volt); }
.cc-pro  { background:rgba(255,107,107,.15); color:#FF6B6B; }
.ath-chip-heat { font-size:clamp(9px,.8vw,11px); color:var(--muted); font-family:var(--mono); }
.ath-chip-score { font-family:var(--mono); font-size:clamp(15px,1.7vw,22px); font-weight:800; flex-shrink:0; text-align:right; }

/* ── LEADERBOARD ─────────────────────────────────────────────────── */
#lb-panel {
  border-left:2px solid var(--border); background:#0E0E0E;
  display:flex; flex-direction:column; overflow:hidden; min-height:0;
}
.lb-head {
  flex-shrink:0; padding:clamp(10px,1.2vh,16px) clamp(12px,1.2vw,22px) clamp(8px,1vh,12px); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
  background:linear-gradient(90deg, #0A0A0A, #0E0E0E);
}
.lb-title { font-size:clamp(9px,.85vw,13px); font-weight:900; text-transform:uppercase; letter-spacing:.15em; color:var(--volt); flex:1; font-family:var(--mono); }
.live-dot { width:7px; height:7px; border-radius:50%; background:#FF4444; animation:pDot 1.2s ease-in-out infinite; flex-shrink:0; }
@keyframes pDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.2;transform:scale(.5)} }

.lb-scroll { flex:1; overflow-y:auto; min-height:0; }

.lb-group { border-bottom:1px solid var(--border); }
.lb-group-hdr {
  padding:clamp(7px,.8vh,11px) clamp(10px,1vw,18px) clamp(4px,.4vh,6px);
  display:flex; align-items:center; gap:8px;
  background:rgba(0,0,0,.3);
}
.lb-group-pill {
  font-size:clamp(7px,.65vw,10px); font-weight:900; letter-spacing:.1em; text-transform:uppercase;
  font-family:var(--mono); padding:2px 8px; border-radius:20px;
  border:1px solid currentColor;
}
.lb-group-count { font-size:clamp(8px,.7vw,11px); color:var(--faint); font-family:var(--mono); margin-left:auto; }

.lb-row {
  display:flex; align-items:center; gap:clamp(6px,.7vw,12px); padding:clamp(7px,.9vh,11px) clamp(10px,1vw,18px);
  border-bottom:1px solid rgba(255,255,255,.03);
  transition:background .15s;
}
.lb-row:hover { background:rgba(255,255,255,.03); }
.lb-pos { width:clamp(20px,2vw,28px); font-size:clamp(12px,1.3vw,17px); font-weight:800; font-family:var(--mono); flex-shrink:0; text-align:center; }
.p1 { color:#FFD700; } .p2 { color:#B0B0B0; } .p3 { color:#CD7F32; } .pn { color:var(--faint); }
.lb-row-name { flex:1; min-width:0; }
.lb-row-last  { font-size:clamp(12px,1.3vw,18px); font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lb-row-first { font-size:clamp(9px,.8vw,12px); color:var(--muted); font-weight:400; margin-top:1px; }
.lb-row-evs   { font-size:clamp(7px,.65vw,10px); font-family:var(--mono); color:var(--faint); margin-top:2px; display:flex; gap:5px; flex-wrap:wrap; }
.lb-row-evs span { color:var(--muted); }
.lb-score { font-family:var(--mono); font-size:clamp(13px,1.4vw,20px); font-weight:800; color:var(--volt); flex-shrink:0; }
.lb-score.none { color:var(--faint); font-size:clamp(9px,.8vw,12px); }

/* ── TIMELINE ────────────────────────────────────────────────────── */
#timeline {
  border-top:2px solid var(--border); background:#0A0A0A;
  display:flex; flex-direction:column; overflow:hidden;
}
.tl-head {
  flex-shrink:0; display:flex; align-items:center;
  padding:clamp(4px,.5vh,8px) clamp(16px,1.8vw,26px); gap:14px; border-bottom:1px solid var(--border);
}
.tl-label { font-size:clamp(7px,.65vw,10px); font-weight:800; letter-spacing:.2em; text-transform:uppercase; font-family:var(--mono); color:var(--muted); }
.tl-now-txt { font-family:var(--mono); font-size:clamp(10px,.9vw,13px); color:var(--volt); font-weight:700; }
.tl-scroll {
  flex:1; display:flex; gap:clamp(5px,.5vw,8px); padding:clamp(5px,.7vh,8px) clamp(16px,1.8vw,24px);
  overflow-x:auto; align-items:flex-start; min-height:0;
}
.tl-scroll::-webkit-scrollbar { height:2px; }

/* NOW separator */
.tl-sep {
  flex-shrink:0; width:2px; background:var(--volt); border-radius:1px;
  position:relative; margin:0 4px;
}
.tl-sep::before {
  content:'NOW'; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) rotate(-90deg);
  font-size:8px; font-weight:800; font-family:var(--mono); color:var(--volt);
  letter-spacing:.1em; white-space:nowrap;
  background:#0A0A0A; padding:2px 4px;
}

/* Departure cards */
.dep-card {
  flex-shrink:0; width:clamp(130px,13vw,180px);
  background:var(--card); border:1px solid rgba(255,255,255,.06);
  border-top:2px solid var(--dc,#444);
  border-radius:8px; padding:clamp(6px,.8vh,10px) clamp(8px,.8vw,12px);
  display:flex; flex-direction:column; gap:2px;
  position:relative; transition:border-color .3s;
}
.dep-card.soon { border-top-color:var(--dc); border-color:color-mix(in srgb,var(--dc) 35%,transparent); }
.dep-card.soon .dep-time { animation:pDot .8s ease-in-out infinite; }

@keyframes glowBar { 0%,100%{opacity:1} 50%{opacity:.3} }

.dep-zone-name { font-size:clamp(7px,.65vw,9px); font-weight:700; text-transform:uppercase; letter-spacing:.07em; display:flex; align-items:center; gap:3px; color:var(--muted); }
.dep-time      { font-family:var(--mono); font-size:clamp(16px,1.8vw,24px); font-weight:900; line-height:1.1; color:var(--dc,var(--muted)); }
.dep-heat      { font-family:var(--mono); font-size:clamp(8px,.7vw,10px); color:var(--faint); font-weight:600; }
.dep-aths      { display:flex; flex-direction:column; gap:2px; margin-top:3px; }
.dep-ath       { display:flex; align-items:center; gap:4px; }
.dep-ath-name  { font-size:clamp(9px,.9vw,13px); font-weight:800; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dep-cat       { font-size:clamp(6px,.55vw,8px); font-weight:700; font-family:var(--mono); padding:1px 4px; border-radius:5px; text-transform:uppercase; flex-shrink:0; }
.dep-elapsed   { font-family:var(--mono); font-size:clamp(8px,.7vw,10px); font-weight:700; color:var(--dc); padding-top:2px; border-top:1px solid var(--border); margin-top:2px; }
.dep-soon-lbl  { font-family:var(--mono); font-size:clamp(8px,.7vw,10px); font-weight:700; color:var(--dc); padding-top:2px; border-top:1px solid var(--border); margin-top:2px; }

/* scrollbar */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── NEWS TICKER ─────────────────────────────────────────────────── */
#news-ticker {
  background:#0D0D0D; border-top:1px solid var(--border);
  height:clamp(28px,4vh,40px); display:flex; align-items:center;
  overflow:hidden; flex-shrink:0;
  transition: height .3s ease;
}
#news-ticker.hidden { height:0; border-top:none; }
.ticker-label {
  flex-shrink:0; padding:0 clamp(10px,1.2vw,18px);
  font-size:clamp(7px,.65vw,10px); font-weight:900; letter-spacing:.2em; text-transform:uppercase;
  font-family:var(--mono); color:#0A0A0A;
  background:var(--volt); height:100%;
  display:flex; align-items:center; white-space:nowrap;
}
.ticker-track { flex:1; overflow:hidden; position:relative; height:100%; }
.ticker-inner { display:inline-flex; align-items:center; height:100%; white-space:nowrap; will-change:transform; }
.ticker-msg { font-size:clamp(11px,1.2vw,16px); font-weight:600; color:var(--text); padding:0 clamp(40px,5vw,70px); flex-shrink:0; }
.ticker-dot { width:4px; height:4px; border-radius:50%; background:var(--volt); flex-shrink:0; opacity:.6; margin:0 5px; }

/* ══════════════════════════════════════════════════════════════
   POPUP DÉPART — layout horizontal TV
══════════════════════════════════════════════════════════════ */
#dep-overlay {
  position:fixed; inset:0; z-index:9998;
  background:#040404;
  display:flex; flex-direction:column;
  opacity:0; pointer-events:none;
  transition:opacity .5s ease;
  overflow:hidden;
  --dc: #C6FF00;
}
#dep-overlay.show { opacity:1; pointer-events:auto; }

/* Glow de fond dynamique */
#dep-bg-glow {
  position:absolute; inset:0; pointer-events:none;
  transition:background 1.2s ease;
}

/* Scan-lines subtiles */
#dep-overlay::before {
  content:''; position:absolute; inset:0; z-index:0;
  background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,.012) 3px, rgba(255,255,255,.012) 4px);
  pointer-events:none;
}

/* Bande couleur verticale gauche */
#dep-stripe {
  position:absolute; left:0; top:0; bottom:0; width:8px;
  background:var(--dc); box-shadow:0 0 40px var(--dc), 0 0 80px var(--dc);
  z-index:2; transition:background .6s, box-shadow .6s;
}

/* Bouton fermer */
#dep-close {
  position:absolute; top:clamp(14px,2vh,28px); right:clamp(14px,2vw,28px);
  width:40px; height:40px; border-radius:50%;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
  cursor:pointer; font-size:16px; color:rgba(255,255,255,.35);
  z-index:10; display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
#dep-close:hover { background:rgba(255,255,255,.12); color:#fff; }

/* Layout principal : gauche (infos) | droite (ring) */
#dep-content {
  position:relative; z-index:2;
  display:grid; grid-template-columns:1fr clamp(280px,38vw,520px);
  align-items:stretch; flex:1; height:100%;
  padding:0 clamp(32px,4vw,64px) 0 clamp(48px,5vw,80px);
}

/* ── Panneau gauche : zone + athlètes ── */
#dep-left {
  display:flex; flex-direction:column; justify-content:center;
  gap:clamp(16px,2.5vh,32px); padding:clamp(24px,3vh,48px) clamp(24px,3vw,48px) clamp(24px,3vh,48px) 0;
  border-right:1px solid rgba(255,255,255,.07);
}

/* Badge Heat */
#dep-heat-badge {
  display:inline-flex; align-items:center;
  font-family:var(--mono); font-size:clamp(10px,1vw,14px); font-weight:800;
  letter-spacing:.35em; text-transform:uppercase;
  color:#040404; background:var(--dc);
  padding:clamp(5px,.6vh,8px) clamp(14px,1.6vw,22px); border-radius:5px;
  align-self:flex-start;
}

/* Zone */
#dep-zone-row {
  display:flex; align-items:center; gap:clamp(14px,1.8vw,24px);
}
#dep-zone-icon-big {
  width:clamp(56px,7vw,90px); height:clamp(56px,7vw,90px); border-radius:20px;
  font-size:clamp(26px,3.5vw,46px);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  background:color-mix(in srgb, var(--dc) 12%, transparent);
  border:2px solid color-mix(in srgb, var(--dc) 30%, transparent);
}
#dep-zone-label {
  font-size:clamp(9px,.8vw,12px); font-family:var(--mono); font-weight:700;
  letter-spacing:.28em; text-transform:uppercase;
  color:var(--dc); opacity:.7; margin-bottom:4px;
}
#dep-zone-name {
  font-size:clamp(26px,3.8vw,58px); font-weight:900; text-transform:uppercase;
  letter-spacing:.04em; color:#fff; line-height:1;
}

/* Athlètes */
#dep-aths {
  display:flex; flex-direction:column; gap:clamp(8px,1.2vh,16px);
}
.dep-ath-chip {
  background:rgba(255,255,255,.04);
  border:1px solid color-mix(in srgb, var(--dc) 22%, transparent);
  border-left:4px solid var(--dc);
  border-radius:12px; padding:clamp(12px,1.6vh,20px) clamp(16px,2vw,28px);
  display:flex; align-items:center; gap:clamp(12px,1.5vw,20px);
}
.dep-ath-chip-num {
  font-family:var(--mono); font-size:clamp(22px,3vw,40px); font-weight:900;
  color:var(--dc); opacity:.35; line-height:1; flex-shrink:0;
  min-width:clamp(30px,3vw,48px); text-align:right;
}
.dep-ath-chip-body { flex:1; min-width:0; }
.dep-ath-chip-name {
  font-size:clamp(18px,2.4vw,36px); font-weight:900; color:#fff; line-height:1.1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.dep-ath-chip-fn {
  font-size:clamp(13px,1.4vw,20px); font-weight:400; color:rgba(255,255,255,.55);
  margin-top:2px;
}
.dep-ath-chip-meta {
  font-size:clamp(9px,.8vw,12px); font-weight:700; font-family:var(--mono);
  letter-spacing:.12em; text-transform:uppercase;
  color:var(--dc); margin-top:4px; opacity:.75;
}

/* ── Panneau droit : ring décompte ── */
#dep-right {
  display:flex; align-items:center; justify-content:center;
  padding:clamp(24px,3vh,48px) clamp(16px,2vw,32px);
}

/* Anneau SVG */
#dep-ring-wrap {
  position:relative;
  width:clamp(200px,30vw,420px); height:clamp(200px,30vw,420px);
  flex-shrink:0;
}
#dep-ring-svg {
  width:100%; height:100%;
  transform:rotate(-90deg);
}
#dep-ring-bg {
  stroke:rgba(255,255,255,.06);
  fill:none; stroke-width:12;
}
#dep-ring-fill {
  fill:none; stroke-width:12; stroke-linecap:round;
  stroke:var(--dc);
  transition:stroke .3s ease, stroke-dashoffset 1s linear;
  filter:drop-shadow(0 0 14px var(--dc)) drop-shadow(0 0 28px var(--dc));
}
#dep-ring-inner {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:0;
}
#dep-label {
  font-family:var(--mono); font-size:clamp(8px,.65vw,11px); font-weight:800;
  letter-spacing:.5em; text-transform:uppercase;
  color:var(--dc); opacity:.5; margin-bottom:4px;
}
#dep-cd {
  font-size:clamp(80px,13vw,160px); font-weight:900;
  font-family:var(--mono); line-height:.9;
  color:var(--dc); transition:color .2s;
  text-shadow:0 0 60px color-mix(in srgb,var(--dc) 60%,transparent);
}
#dep-cd.c3 { color:#f0a050; }
#dep-cd.c2 { color:#e84040; }
#dep-cd.c1 { color:#ff1a1a; }
#dep-unit {
  font-family:var(--mono); font-size:clamp(9px,.75vw,12px); font-weight:400;
  letter-spacing:.4em; text-transform:uppercase; color:rgba(255,255,255,.2);
  margin-top:8px;
}

/* GO ! */
#dep-go {
  display:none; font-family:var(--mono);
  font-size:clamp(72px,12vw,160px);
  font-weight:900; letter-spacing:.12em; text-transform:uppercase;
  color:var(--dc); line-height:1;
  text-shadow:0 0 80px color-mix(in srgb,var(--dc) 90%,transparent),
              0 0 160px color-mix(in srgb,var(--dc) 50%,transparent);
}

/* Barre de progression bas */
#dep-bar-wrap {
  position:absolute; bottom:0; left:0; right:0; height:6px;
  background:rgba(255,255,255,.05); z-index:10;
}
#dep-bar {
  height:100%; width:0%;
  background:linear-gradient(90deg, transparent, var(--dc), #fff);
  transition:width 1s linear;
  box-shadow:0 0 16px var(--dc), 0 0 32px var(--dc);
}

/* Animations */
@keyframes numPunch {
  0%  { transform:scale(1.6); opacity:.3; }
  55% { transform:scale(.92); }
  100%{ transform:scale(1);   opacity:1; }
}
.num-punch { animation:numPunch .4s cubic-bezier(.22,.61,.36,1) forwards; }

@keyframes goBlast {
  0%  { transform:scale(.04) rotate(-10deg); opacity:0; }
  40% { transform:scale(1.18) rotate(2deg); opacity:1; }
  65% { transform:scale(.97) rotate(0); }
  100%{ transform:scale(1)   rotate(0); }
}
#dep-go.blasting { animation:goBlast .55s cubic-bezier(.17,.67,.3,1.33) forwards; }

@keyframes overlayFlash {
  0%  { background:color-mix(in srgb,var(--dc) 40%,transparent); }
  35% { background:color-mix(in srgb,var(--dc) 7%,transparent); }
  100%{ background:transparent; }
}
#dep-overlay.go-flash::after {
  content:''; position:absolute; inset:0;
  animation:overlayFlash .9s ease-out forwards; pointer-events:none; z-index:3;
}

@keyframes shockwave {
  0%  { transform:translate(-50%,-50%) scale(.05); opacity:1; border-width:10px; }
  100%{ transform:translate(-50%,-50%) scale(8);   opacity:0; border-width:1px; }
}
.shockwave {
  position:fixed; top:50%; left:50%; width:100px; height:100px;
  border-radius:50%; border:8px solid var(--dc);
  animation:shockwave 1.1s ease-out forwards; pointer-events:none; z-index:5;
}
.shockwave2 { animation-delay:.22s; border-color:#fff; opacity:.5; }
</style>

<script src="./assets/js/data.js"></script>
<script>
/* ── ZONE META ─────────────────────────────────────────────────── */
const ZM = {
  ev_warmup:    { color:'#FF6B35', icon:'🔥', label:'Warm-Up'   },
  ev_strength:  { color:'#FF4444', icon:'🏋️', label:'Strength'  },
  ev_refuel:    { color:'#00D4AA', icon:'💧', label:'Refuel'     },
  ev_endurance: { color:'#C6FF00', icon:'🏃', label:'Endurance' },
  ev_recovery:  { color:'#9B5DE5', icon:'⚡', label:'Recovery'  },
  ev_metcon:    { color:'#00BFFF', icon:'⏱️', label:'MetCon X'  },
};

/* ── HELPERS ───────────────────────────────────────────────────── */
function pad(n){ return String(Math.floor(Math.abs(n))).padStart(2,'0'); }
function parseHm(hm){ const [h,m]=String(hm||'08:00').split(':').map(Number); return (h||0)*60+(m||0); }
function mToHm(m){ return `${pad(m/60)}:${pad(m%60)}`; }
function nowMin(){ return AthxStore.effectiveNowMin(typeof state!=='undefined'?state:null); }
function catCls(c){ return c==='Lite'?'cc-lite':c==='Pro'?'cc-pro':'cc-athx'; }
function catColor(c){ return c==='Lite'?'#60A5FA':c==='Pro'?'#FF6B6B':'#C6FF00'; }

function fmtScore(sc, ev){
  if(!sc||sc.dnf) return null;
  const raw=sc.rawValue??sc.performance;
  if(raw==null||raw==='') return null;
  if(ev.scoreUnit==='s'){
    const v=AthxStore.parseScoreValue(String(raw));
    if(v==null) return String(raw);
    return `${pad(v/60)}:${pad(v%60)}`;
  }
  return String(raw)+(ev.scoreUnit?' '+ev.scoreUnit:'');
}

/* ── SCHEDULE HELPERS ──────────────────────────────────────────── */
function getMetconStagger(state){
  return Number(state?.config?.metconStaggerMinutes ?? 2);
}

// Retourne le temps de départ MetCon d'un athlète donné dans un heat
// (index = position de l'athlète dans le tableau athletes du heat)
function metconStartFor(baseZs, athIdx, stagger){
  return baseZs + athIdx * stagger;
}

function fullSchedule(state){
  const schedule=AthxStore.buildHeatSchedule(state);
  const events=[...state.events].sort((a,b)=>a.order-b.order);
  const stagger=getMetconStagger(state);
  const entries=[];
  schedule.forEach(({heat,startTime,athletes})=>{
    let cursor=parseHm(startTime);
    events.forEach(ev=>{
      const zs=cursor, ze=cursor+ev.durationMinutes; cursor=ze;
      if(ev.id==='ev_metcon' && stagger>0){
        // Une entrée par athlète avec décalage
        athletes.forEach((a,i)=>{
          const azs=metconStartFor(zs,i,stagger);
          const aze=azs+ev.durationMinutes;
          entries.push({heat,athletes:[a],eventId:ev.id,ev,zs:azs,ze:aze});
        });
      } else {
        entries.push({heat,athletes,eventId:ev.id,ev,zs,ze});
      }
    });
  });
  return entries.sort((a,b)=>a.zs-b.zs||a.heat-b.heat);
}

function getZoneMap(state, nm){
  const schedule=AthxStore.buildHeatSchedule(state);
  const events=[...state.events].sort((a,b)=>a.order-b.order);
  const stagger=getMetconStagger(state);
  const zm={};
  events.forEach(e=>{ zm[e.id]=[]; });
  schedule.forEach(({heat,startTime,athletes})=>{
    let cursor=parseHm(startTime);
    events.forEach(ev=>{
      const zs=cursor, ze=cursor+ev.durationMinutes; cursor=ze;
      if(ev.id==='ev_metcon' && stagger>0){
        // Chaque athlète a sa propre fenêtre MetCon
        athletes.forEach((a,i)=>{
          const azs=metconStartFor(zs,i,stagger);
          const aze=azs+ev.durationMinutes;
          if(nm>=azs&&nm<aze){
            const sc=state.scores.find(s=>s.teamId===a.id&&s.eventId===ev.id)||null;
            zm[ev.id].push({athlete:a,heat,elapsed:nm-azs,remaining:aze-nm,score:sc});
          }
        });
      } else {
        if(nm>=zs&&nm<ze){
          athletes.forEach(a=>{
            const sc=state.scores.find(s=>s.teamId===a.id&&s.eventId===ev.id)||null;
            zm[ev.id].push({athlete:a,heat,elapsed:nm-zs,remaining:ze-nm,score:sc});
          });
        }
      }
    });
  });
  return zm;
}

/* ── RENDER ZONES ──────────────────────────────────────────────── */
function renderZones(state){
  const nm=nowMin();
  const events=[...state.events].sort((a,b)=>a.order-b.order);
  const zm=getZoneMap(state,nm);
  const panel=document.getElementById('zones-panel');

  panel.innerHTML=events.map(ev=>{
    const meta=ZM[ev.id]||{color:'#888',icon:'📍',label:ev.name};
    const here=zm[ev.id]||[];
    const active=here.length>0;

    // Cacher les zones de transition (non scorées) quand elles sont vides
    if(!active && !ev.scored) return '';

    const badge=`<span class="zbadge ${ev.scored?'zbadge-scored':'zbadge-unscored'}">${ev.scored?'Scorée':'Transition'}</span>`;

    if(!active){
      // Ligne compacte (zones scorées en attente uniquement)
      return `
        <div class="zone-row">
          <span class="zone-row-icon">${meta.icon}</span>
          <span class="zone-row-name" style="color:${meta.color}88">${meta.label}</span>
          ${badge}
          <span class="zone-row-dur">${ev.durationMinutes} min</span>
        </div>`;
    }

    // Carte expandée — active
    const totalSec = ev.durationMinutes * 60;
    const elapsedSec = here[0].elapsed * 60;
    const remTotalSec = Math.max(0, Math.round(here[0].remaining * 60));
    const remM = Math.floor(remTotalSec / 60);
    const remS = remTotalSec % 60;
    const pct = Math.min(100, (elapsedSec / totalSec) * 100);
    const timerColor = remTotalSec <= 120 ? '#FF4444' : remTotalSec <= 300 ? '#FF9500' : meta.color;

    const scoredEvs=state.events.filter(e=>e.scored).sort((a,b)=>a.order-b.order);
    const ranking=AthxStore.getRanking(state);

    const chips=here.map(({athlete,heat,score})=>{
      const sc=fmtScore(score,ev);
      const ln=(athlete.lastName||'').toUpperCase();
      const fn=athlete.firstName||'';
      const rEntry=ranking.find(r=>r.team.id===athlete.id);

      // Pills pour chaque épreuve scorée
      const pills=scoredEvs.map(sev=>{
        const isCurrent=sev.id===ev.id;
        const sc2=state.scores.find(s=>s.teamId===athlete.id&&s.eventId===sev.id);
        const zm2=ZM[sev.id]||{icon:'•',color:'#888',label:'?'};
        const val=sc2?fmtScore(sc2,sev):null;
        const er=rEntry?.eventRanks.find(x=>x.eventId===sev.id);
        const rankStr=er?.rank!=null?'#'+er.rank:'';
        const cls=(isCurrent?'current-zone':'')+' '+(val&&!sc2?.dnf?'scored':'');
        const valDisplay=sc2?.dnf?'DNF':(val||'—');
        const valCls=val&&!sc2?.dnf?'':(sc2?.dnf?'':'empty');
        return `<div class="ath-score-pill ${cls}">
          <span class="asp-icon">${zm2.icon}</span>
          <div class="asp-body">
            <span class="asp-val ${valCls}" style="${val&&!sc2?.dnf?'color:'+zm2.color:''}">${valDisplay}${rankStr?' <span style="font-size:.75em;opacity:.55">'+rankStr+'</span>':''}</span>
            <span class="asp-lbl">${zm2.label}</span>
          </div>
        </div>`;
      }).join('');

      return `
        <div class="ath-chip">
          <div class="ath-chip-top">
            <div class="ath-chip-info">
              <div class="ath-chip-name">${ln}${fn?` <em>${fn}</em>`:''}</div>
              <div class="ath-chip-sub">
                <span class="ath-chip-cat ${catCls(athlete.category)}">${athlete.category}</span>
                <span class="ath-chip-heat">${athlete.gender} · H${heat}</span>
              </div>
            </div>
            <div class="ath-chip-score" style="color:${sc?timerColor:'var(--faint)'}">${sc||'—'}</div>
          </div>
          <div class="ath-scores-row">${pills}</div>
        </div>`;
    }).join('');

    // ze = fin de zone en minutes absolues (pour tickZoneTimers)
    const ze = nm + here[0].remaining;
    return `
      <div class="zone-card" style="--zc:${meta.color}" data-ze="${ze}" data-zd="${ev.durationMinutes}" data-zcolor="${meta.color}">
        <div class="zone-card-header">
          <div class="zone-card-icon">${meta.icon}</div>
          <div class="zone-card-info">
            <div class="zone-card-num">ZONE ${ev.zone}</div>
            <div class="zone-card-name" style="color:${meta.color}">${meta.label}</div>
          </div>
          <div class="zone-card-meta">
            ${badge}
            <span class="zone-card-dur">${ev.durationMinutes} min</span>
          </div>
          <div class="zone-timer">
            <div class="zone-timer-val" data-live-timer style="color:${timerColor}">${pad(remM)}:${pad(remS)}</div>
            <div class="zone-timer-lbl">restant</div>
          </div>
        </div>
        <div class="zone-prog"><div class="zone-prog-fill" data-live-prog style="width:${pct.toFixed(1)}%"></div></div>
        <div class="zone-athletes">${chips}</div>
      </div>`;
  }).join('');
}

/* ── RENDER LEADERBOARD ────────────────────────────────────────── */
function renderLeaderboard(state){
  const ranking=AthxStore.getRanking(state);
  const scoredEvs=state.events.filter(e=>e.scored);
  const ORDER=['Lite|Femme','Lite|Homme','ATHX|Femme','ATHX|Homme','Pro|Femme','Pro|Homme'];
  const groups={};
  ORDER.forEach(k=>{groups[k]=[];});
  ranking.forEach(r=>{
    const k=`${r.team.category}|${r.team.gender}`;
    if(!groups[k]) groups[k]=[];
    groups[k].push(r);
  });

  // Construire une map "qui est en zone actuellement"
  const nm=nowMin();
  const zm=getZoneMap(state,nm);
  const inZone={}; // teamId -> {color, icon}
  Object.entries(zm).forEach(([evId,entries])=>{
    const meta=ZM[evId];
    entries.forEach(({athlete})=>{ inZone[athlete.id]={color:meta?.color||'#888',icon:meta?.icon||'•',label:meta?.label||''}; });
  });

  document.getElementById('lbScroll').innerHTML=ORDER.filter(k=>groups[k]?.length).map(k=>{
    const [cat,gend]=k.split('|');

      const scored=r.scoredCount>0;
      const pc=scored?(i===0?'p1':i===1?'p2':i===2?'p3':'pn'):'pn';
      const medal=scored&&i<3?['🥇','🥈','🥉'][i]:i+1;
      const detail=scoredEvs.map(ev=>{
        const er=r.eventRanks.find(x=>x.eventId===ev.id);

}

/* ── RENDER TIMELINE ───────────────────────────────────────────── */
function renderTimeline(state){
  const nm=nowMin();
  const entries=fullSchedule(state);
  if(!entries.length){
    document.getElementById('tlScroll').innerHTML='<div style="color:var(--faint);font-size:12px;padding:16px">Aucun athlète enregistré.</div>';
    return;
  }

  let nowInsertIdx=-1;
  for(let i=0;i<entries.length;i++){
    if(entries[i].zs>nm){ nowInsertIdx=i; break; }
  }

  let html='';
  let nowInserted=false;

  const TL_ZONES = new Set(['ev_strength','ev_endurance','ev_metcon']);
  entries.forEach((e,idx)=>{
    if(nm>=e.zs) return; // masquer en cours et terminés
    if(!TL_ZONES.has(e.eventId)) return; // masquer warm-up, refuel, recovery

    if(!nowInserted&&(nowInsertIdx===idx||(nowInsertIdx===-1&&idx===entries.length-1))){
      html+=`<div class="tl-sep"></div>`;
      nowInserted=true;
    }

    const meta=ZM[e.eventId]||{color:'#666',icon:'•',label:e.ev?.name||''};
    const isSoon=(e.zs-nm)<=10;
    const cls=isSoon?'soon':'';

    const athsHtml=e.athletes.map(a=>`
      <div class="dep-ath">
        <div class="dep-ath-name">${(a.lastName||a.name||'').toUpperCase()}${a.firstName?' <span style="opacity:.65;font-weight:600">'+a.firstName.charAt(0)+'.</span>':''}</div>
        <span class="dep-cat ${catCls(a.category)}">${a.category}</span>
      </div>`).join('');

    let statusHtml='';
    if(isSoon){
      statusHtml=`<div class="dep-soon-lbl">🔔 dans ${Math.ceil(e.zs-nm)} min</div>`;
    }

    html+=`
      <div class="dep-card ${cls}" style="--dc:${meta.color}">
        <div class="dep-zone-name">${meta.icon} ${meta.label}</div>
        <div class="dep-time">${mToHm(e.zs)}</div>
        <div class="dep-heat">Heat ${e.heat}</div>
        <div class="dep-aths">${athsHtml}</div>
        ${statusHtml}
      </div>`;
  });

  if(!nowInserted) html=`<div class="tl-sep"></div>`+html;

  const tlScroll=document.getElementById('tlScroll');
  tlScroll.innerHTML=html;

  // Centrer sur NOW
  const sep=tlScroll.querySelector('.tl-sep');
  if(sep) requestAnimationFrame(()=>sep.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}));

  document.getElementById('tlNow').textContent=`${pad(new Date().getHours())}h${pad(new Date().getMinutes())}`;
}

/* ── [renderResults supprimé — vue unique live] ────────────────── */
function _buildScorePill(sc, er, ev, zm, isBest, compact){ // gardé pour compat éventuelle
  if(!sc){
    if(compact) return '<div class="res-extra-pill" style="opacity:.3">'+zm.icon+' \u2014</div>';
    return '<div class="res-score-pill">'
      +'<span class="res-pill-icon" style="opacity:.3">'+zm.icon+'</span>'
      +'<div class="res-pill-body">'
        +'<span class="res-pill-lbl">'+zm.label+'</span>'
        +'<span class="res-pill-val" style="color:var(--faint)">\u2014</span>'
      +'</div></div>';
  }
  if(sc.dnf){
    if(compact) return '<div class="res-extra-pill" style="border-color:#FF444440;color:#FF4444">'+zm.icon+' DNF</div>';
    return '<div class="res-score-pill'+(isBest?' best':'')+'"><span class="res-pill-icon">'+zm.icon+'</span>'
      +'<div class="res-pill-body"><span class="res-pill-lbl">'+zm.label+'</span>'
      +'<span class="res-pill-val" style="color:#FF4444">DNF</span></div></div>';
  }
  // Format value
  var val = sc.rawValue!=null ? sc.rawValue : sc.performance;
  var subLabel = '';
  if(ev.timeCap && sc.timeCapped){
    var reps = sc.reps != null ? sc.reps : (100000 - Number(sc.rawValue));
    val = '+'+reps; subLabel = 'TIME CAP';
  } else if(ev.scoreUnit==='s'){
    var v = AthxStore.parseScoreValue(String(sc.rawValue!=null?sc.rawValue:sc.performance||''));
    if(v!=null) val = pad(v/60)+':'+pad(v%60);
  } else if(val!=null && val!==''){
    val = String(val)+(ev.scoreUnit?' '+ev.scoreUnit:'');
  }
  var col  = isBest ? zm.color : 'var(--text)';
  var rank = er && er.rank!=null ? '#'+er.rank : '';
  var lbl  = zm.label+(subLabel?' \u00b7 '+subLabel:'');
  var lblStyle = isBest ? 'color:'+zm.color : '';
  if(compact){
    var pillStyle = isBest ? 'border-color:'+zm.color+'44;color:'+zm.color : '';
    var rankSpan  = rank ? '<span style="opacity:.5;font-size:10px">'+rank+'</span>' : '';
    return '<div class="res-extra-pill" style="'+pillStyle+'">'+zm.icon+' '+val+' '+rankSpan+'</div>';
  }
  var rankLine = rank ? '<span class="res-pill-rank">'+rank+(isBest?' \u2605':'')+'</span>' : '';
  return '<div class="res-score-pill'+(isBest?' best':'')+'"><span class="res-pill-icon">'+zm.icon+'</span>'
    +'<div class="res-pill-body">'
      +'<span class="res-pill-lbl" style="'+lblStyle+'">'+lbl+'</span>'
      +'<span class="res-pill-val" style="color:'+col+'">'+val+'</span>'
      +rankLine
    +'</div></div>';
}

function renderResults(state){
  var ranking   = AthxStore.getRanking(state);
  var scoredEvs = state.events.filter(function(e){ return e.scored; }).sort(function(a,b){ return a.order-b.order; });
  var ORDER = ['Lite|Femme','Lite|Homme','ATHX|Femme','ATHX|Homme','Pro|Femme','Pro|Homme'];
  var groups={};
  ORDER.forEach(function(k){ groups[k]=[]; });
  ranking.forEach(function(r){
    var k = r.team.category+'|'+r.team.gender;
    if(groups[k]) groups[k].push(r);
  });

  var bestRank={};
  ORDER.forEach(function(k){
    bestRank[k]={};
    scoredEvs.forEach(function(ev){
      var ranks=groups[k].map(function(r){ var er=r.eventRanks.find(function(x){ return x.eventId===ev.id; }); return er?er.rank:null; }).filter(function(x){ return x!=null; });
      if(ranks.length) bestRank[k][ev.id]=Math.min.apply(null,ranks);

  var MEDALS     = ['&#129351;','&#129352;','&#129353;']; // 🥇🥈🥉

        +'<span class="res-cat-gend">'+gend+'</span>'
        +'<span class="res-cat-count">'+list.length+' athl\u00e8tes</span>'
        +'<span class="res-cat-scored">'+totalSc+'/'+scoredEvs.length+' zones scor\u00e9es</span>'
      +'</div></div>';

    // Podium cards
    var podiumGroup = list.slice(0,3);
    var extraGroup  = list.slice(3);

    var cards = podiumGroup.map(function(r,i){
      var scored     = r.scoredCount>0;
      var rankCls    = (scored && i<3) ? RANK_CLS[i] : '';
      var stripeCol  = (scored && i<3) ? MEDAL_COLS[i] : col+'55';
      var medHtml    = (scored && i<3) ? '<span class="res-card-medal">'+MEDALS[i]+'</span>' : '<span class="res-card-rank-num">'+(i+1)+'</span>';
      var totalCol   = scored ? (i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--volt)') : 'var(--faint)';

      var pills = scoredEvs.map(function(ev){
        var sc   = state.scores.find(function(s){ return s.teamId===r.team.id&&s.eventId===ev.id; });
        var er   = r.eventRanks.find(function(x){ return x.eventId===ev.id; });
        var zm   = ZM[ev.id]||{icon:'•',color:'#888',label:'?'};
        var best = er && er.rank!=null && er.rank===bestRank[k][ev.id];
        return _buildScorePill(sc||null, er||null, ev, zm, best, false);
      }).join('');

      var dots = scoredEvs.map(function(ev){
        var sc = state.scores.find(function(s){ return s.teamId===r.team.id&&s.eventId===ev.id; });
        var zm = ZM[ev.id]||{icon:'•'};
        return '<span class="res-card-ev-dot" style="opacity:'+(sc?'1':'.2')+'">'+zm.icon+'</span>';
      }).join('');

      return '<div class="res-card '+rankCls+'">'
        +'<div class="res-card-stripe" style="background:'+stripeCol+'"></div>'
        +'<div class="res-card-hdr">'+medHtml
          +'<div class="res-card-name">'
            +'<div class="res-card-last">'+((r.team.lastName||r.team.name||'').toUpperCase())+'</div>'
            +'<div class="res-card-first">'+(r.team.firstName||'')+'</div>'
          +'</div>'
        +'</div>'
        +'<div class="res-card-scores">'+pills+'</div>'
        +'<div class="res-card-footer">'
          +'<div>'
            +'<div class="res-card-total-val" style="color:'+totalCol+'">'+(scored?r.total:'\u2014')+'</div>'
            +'<div class="res-card-total-lbl">'+(scored?'points':'')+'</div>'
          +'</div>'
          +'<div class="res-card-complete">'+dots+'</div>'
        +'</div>'
        +'</div>';
    }).join('');

    var podiumHtml = '<div class="res-podium">'+cards+'</div>';

    // Extra rows (4th+)
    var extrasHtml = '';
    if(extraGroup.length){
      var rows = extraGroup.map(function(r,i){
        var pos    = i+4;
        var scored = r.scoredCount>0;
        var pills  = scoredEvs.map(function(ev){
          var sc   = state.scores.find(function(s){ return s.teamId===r.team.id&&s.eventId===ev.id; });
          var er   = r.eventRanks.find(function(x){ return x.eventId===ev.id; });
          var zm   = ZM[ev.id]||{icon:'•',color:'#888',label:'?'};
          var best = er && er.rank!=null && er.rank===bestRank[k][ev.id];
          return _buildScorePill(sc||null, er||null, ev, zm, best, true);
        }).join('');
        var totalHtml = scored
          ? r.total+'<span style="font-size:11px;opacity:.5;margin-left:3px">pts</span>'
          : '\u2014';
        return '<div class="res-extra-row">'
          +'<div class="res-extra-rank">'+pos+'</div>'
          +'<div class="res-extra-name">'
            +'<div class="res-extra-last">'+((r.team.lastName||r.team.name||'').toUpperCase())+'</div>'
            +'<div class="res-extra-first">'+(r.team.firstName||'')+'</div>'
          +'</div>'
          +'<div class="res-extra-pills">'+pills+'</div>'
          +'<div class="res-extra-total" style="color:'+(scored?'var(--volt)':'var(--faint)')+'">'+totalHtml+'</div>'
          +'</div>';
      }).join('');
      extrasHtml = '<div class="res-extras">'+rows+'</div>';
    }

    return '<div class="res-section">'+hdr+podiumHtml+extrasHtml+'</div>';
  }).join('');

  // [renderResults désactivé — vue unique live]
}

/* ── AUTO-SCROLL ENGINE ────────────────────────────────────────── */
// px/s de défilement
const SCROLL_SPEED = 40;
// Pause en ms en haut et en bas avant d'inverser
const SCROLL_PAUSE = 2200;

const scrollers = {}; // id -> { raf, dir, paused }

function stopScroll(id){
  if(scrollers[id]){
    cancelAnimationFrame(scrollers[id].raf);
    delete scrollers[id];
  }
}

function startScroll(el){
  if(!el) return;
  const id = el.id || Math.random();
  stopScroll(id);

  let dir      = 1;        // 1 = vers le bas, -1 = vers le haut
  let pausing  = false;
  let pauseEnd = 0;
  let last     = null;

  function step(ts){
    if(!document.body.contains(el)){ stopScroll(id); return; }

    if(last===null) last=ts;
    const dt = (ts-last)/1000; // secondes
    last = ts;

    if(pausing){
      if(ts >= pauseEnd){ pausing=false; }
      scrollers[id].raf = requestAnimationFrame(step);
      return;
    }

    const maxScroll = el.scrollHeight - el.clientHeight;
    if(maxScroll <= 0){ scrollers[id].raf = requestAnimationFrame(step); return; }

    el.scrollTop += dir * SCROLL_SPEED * dt;

    if(dir===1 && el.scrollTop >= maxScroll - 2){
      el.scrollTop = maxScroll;
      dir = -1; pausing = true; pauseEnd = ts + SCROLL_PAUSE;
    } else if(dir===-1 && el.scrollTop <= 2){
      el.scrollTop = 0;
      dir = 1; pausing = true; pauseEnd = ts + SCROLL_PAUSE;
    }

    scrollers[id] = { raf: requestAnimationFrame(step), dir, pausing };
  }

  scrollers[id] = { raf: requestAnimationFrame(step), dir, pausing:true, pauseEnd: performance.now()+800 };
}

function startLiveScrollers(){
  Object.keys(scrollers).forEach(stopScroll);
  setTimeout(()=>{
    startScroll(document.getElementById('zones-panel'));
    startScroll(document.getElementById('lbScroll'));
  }, 300);
}

const AUDIO_URL = 'https://hyflender.github.io/tv-screen/10%20Seconds%20Timer.mp3';
let _depAudio = null;
let _depTimer = null;
const _depShown = new Set();

// Pré-charge l'audio au premier clic (politique autoplay navigateurs)
document.addEventListener('click', function _ia(){
  if(_depAudio) return;
  _depAudio = new Audio(AUDIO_URL);
  _depAudio.preload='auto'; _depAudio.load();
  document.removeEventListener('click',_ia);
},{once:true});

function _playSound(){
  try {
    if(!_depAudio) _depAudio = new Audio(AUDIO_URL);
    _depAudio.currentTime=0;
    _depAudio.play().catch(()=>{});
  } catch(_){}
}
function _punch(el){ el.classList.remove('num-punch'); void el.offsetWidth; el.classList.add('num-punch'); }

/* ── Ring SVG helpers ─────────────────────────────────────── */
const RING_R   = 128;
const RING_C   = 2 * Math.PI * RING_R; // ≈ 804

function setRing(secs, total){
  const fill = document.getElementById('dep-ring-fill');
  if(!fill) return;
  const progress = Math.max(0, Math.min(1, secs / Math.max(total,1)));
  fill.style.strokeDasharray  = RING_C;
  fill.style.strokeDashoffset = RING_C * (1 - progress);
}

function setRingColor(color){
  const fill = document.getElementById('dep-ring-fill');
  if(fill) fill.style.stroke = color;
  document.getElementById('dep-overlay').style.setProperty('--dc', color);
  document.getElementById('dep-bg-glow').style.background =
    `radial-gradient(ellipse 55% 80% at 75% 50%, color-mix(in srgb,${color} 18%,transparent) 0%, transparent 65%),`+
    `radial-gradient(ellipse 40% 50% at 30% 50%, color-mix(in srgb,${color} 8%,transparent) 0%, transparent 60%)`;
  const stripe = document.getElementById('dep-stripe');
  if(stripe){ stripe.style.background=color; stripe.style.boxShadow=`0 0 40px ${color}, 0 0 80px ${color}`; }
}

function hideDep(){
  document.getElementById('dep-overlay').classList.remove('show');
  if(_depTimer){ clearInterval(_depTimer); _depTimer=null; }
  if(_depAudio){ _depAudio.pause(); _depAudio.currentTime=0; }
  document.getElementById('dep-unit').style.display='';
  document.getElementById('dep-go').style.display='none';
  document.getElementById('dep-cd').style.display='block';
  document.getElementById('dep-label').style.display='';
}

function showDep(entries, secsLeft){
  const overlay = document.getElementById('dep-overlay');
  const cdEl    = document.getElementById('dep-cd');
  const goEl    = document.getElementById('dep-go');
  const barEl   = document.getElementById('dep-bar');

  // Zone identity
  const meta  = ZM[entries[0].eventId] || { icon:'📍', label:'Zone', color:'#C6FF00' };
  const zColor = meta.color || '#C6FF00';
  const ev    = entries[0].ev;

  // Appliquer la couleur de zone
  setRingColor(zColor);

  // Heat badge
  const heats = [...new Set(entries.map(e=>e.heat))];
  document.getElementById('dep-heat-badge').textContent = 'HEAT ' + heats.join(' · ');

  // Zone info
  document.getElementById('dep-zone-icon-big').textContent = meta.icon;
  document.getElementById('dep-zone-label').textContent = `ZONE ${ev?.zone || ''}`;
  document.getElementById('dep-zone-name').textContent = meta.label;

  // Athletes — numérotés, avec bande de couleur gauche
  const allAths = [...new Map(entries.flatMap(e=>e.athletes).map(a=>[a.id,a])).values()];
  document.getElementById('dep-aths').innerHTML = allAths.map((a, i)=>{
    const catCol = a.category==='Lite'?'#60A5FA':a.category==='Pro'?'#FF6B6B':zColor;
    return `<div class="dep-ath-chip" style="--dc:${zColor}">
      <div class="dep-ath-chip-num">${String(i+1).padStart(2,'0')}</div>
      <div class="dep-ath-chip-body">
        <div class="dep-ath-chip-name">${(a.lastName||a.name||'').toUpperCase()}</div>
        <div class="dep-ath-chip-fn">${a.firstName||''}</div>
        <div class="dep-ath-chip-meta" style="color:${catCol}">${a.category||''} · ${a.gender||''}</div>
      </div>
    </div>`;
  }).join('');

  // Reset countdown display
  cdEl.textContent = secsLeft; cdEl.className = ''; cdEl.style.display = 'block';
  document.getElementById('dep-label').style.display = '';
  goEl.style.display = 'none'; goEl.className = '';
  document.getElementById('dep-unit').style.display = '';
  const total = Math.max(secsLeft, 1);

  // Init ring & bar
  setRing(secsLeft, total);
  barEl.style.transition = 'none'; barEl.style.width = '0%';
  overlay.classList.add('show');

  if(secsLeft <= 11) _playSound();

  if(_depTimer) clearInterval(_depTimer);
  let secs = secsLeft;
  _depTimer = setInterval(()=>{
    secs--;
    if(secs < 0){ clearInterval(_depTimer); _depTimer = null; return; }

    cdEl.textContent = secs;
    barEl.style.transition = 'width 1s linear';
    barEl.style.width = ((total - secs) / total * 100) + '%';

    // Ring
    setRing(secs, total);

    // Couleur ring + chiffre selon urgence
    cdEl.className = '';
    if(secs <= 3 && secs > 0){
      const urgCols = { 3:'#f0a050', 2:'#e84040', 1:'#ff1a1a' };
      const c = urgCols[secs] || zColor;
      cdEl.classList.add('c'+secs);
      setRingColor(c);
      _punch(cdEl);
    } else if(secs > 3){
      setRingColor(zColor);
    }

    if(secs === 11) _playSound();

    if(secs === 0){
      cdEl.style.display = 'none';
      document.getElementById('dep-label').style.display = 'none';
      document.getElementById('dep-unit').style.display = 'none';
      setRingColor(zColor);
      overlay.classList.add('go-flash');
      // Shockwaves
      ['', 'shockwave2'].forEach(cls => {
        const w = document.createElement('div');
        w.className = 'shockwave' + (cls ? ' ' + cls : '');
        document.body.appendChild(w);
        setTimeout(() => w.remove(), 1400);
      });
      goEl.style.display = 'block'; goEl.className = 'blasting';
      barEl.style.width = '100%';
      setTimeout(() => overlay.classList.remove('go-flash'), 850);
      setTimeout(() => hideDep(), 3500);
    }
  }, 1000);
}

function checkDepartures(){
  if(!state) return;
  const nm=nowMin();
  const entries=fullSchedule(state);
  const toShow=[];
  const SCORED_ZONES = new Set(['ev_strength','ev_endurance','ev_metcon']);
  entries.forEach(e=>{
    if(!SCORED_ZONES.has(e.eventId)) return;
    const key=`${e.heat}_${e.eventId}`;
    if(_depShown.has(key)) return;
    const secs=Math.round((e.zs-nm)*60);
    if(secs<=60&&secs>=0) toShow.push({...e,secs,key});
  });
  if(!toShow.length) return;
  toShow.forEach(t=>_depShown.add(t.key));
  const minSecs=Math.min(...toShow.map(t=>t.secs));
  // Grouper ceux qui démarrent au même moment
  const atSameTime=toShow.filter(t=>Math.abs(t.secs-minSecs)<=2);
  showDep(atSameTime, minSecs);
}

/* ── NEWS TICKER ───────────────────────────────────────────────── */
let _tickerRAF = null;
let _tickerPos = null;
let _tickerTs  = null;
const TICKER_SPEED = 80; // px/s

function renderTicker(state){
  const news   = (state.news||[]).filter(n=>n.active!==false && n.text?.trim());
  const ticker = document.getElementById('news-ticker');
  const inner  = document.getElementById('tickerInner');

  if(!news.length){
    ticker.classList.add('hidden');
    if(_tickerRAF){ cancelAnimationFrame(_tickerRAF); _tickerRAF=null; }
    return;
  }
  ticker.classList.remove('hidden');

  // Rebuild content (pas de duplication)
  inner.innerHTML = news.map(n=>
    `<span class="ticker-msg">${n.text}</span><span class="ticker-dot"></span>`
  ).join('');

  // Lancer le scroll JS depuis la droite
  if(_tickerRAF){ cancelAnimationFrame(_tickerRAF); _tickerRAF=null; }
  _tickerPos = null; _tickerTs = null;

  function step(ts){
    const track = inner.parentElement;
    if(!track || !document.body.contains(inner)){ _tickerRAF=null; return; }

    // Initialiser la position hors-écran droite
    if(_tickerPos===null) _tickerPos = track.clientWidth;
    if(_tickerTs===null)  _tickerTs  = ts;

    const dt = Math.min((ts - _tickerTs) / 1000, 0.1); // cap à 100ms pour éviter les sauts
    _tickerTs = ts;
    _tickerPos -= TICKER_SPEED * dt;

    // Quand le contenu est sorti par la gauche → recommencer depuis la droite
    if(_tickerPos + inner.scrollWidth < 0) _tickerPos = track.clientWidth;

    inner.style.transform = `translateX(${_tickerPos}px)`;
    _tickerRAF = requestAnimationFrame(step);
  }
  _tickerRAF = requestAnimationFrame(step);
}



/* ── TOAST ─────────────────────────────────────────────────────── */
let prevScoreSnapshot = '';
function checkNewScores(nextState){
  const snapshot = JSON.stringify(nextState.scores.map(s=>({t:s.teamId,e:s.eventId,v:s.rawValue??s.performance})));
  if(prevScoreSnapshot && snapshot !== prevScoreSnapshot){
    // Trouver les nouveaux scores
    const prev = JSON.parse(prevScoreSnapshot||'[]');
    const next = nextState.scores;
    const added = next.filter(ns=>{
      const old=prev.find(p=>p.t===ns.teamId&&p.e===ns.eventId);
      return !old||(old.v!==(ns.rawValue??ns.performance));
    });
    added.forEach(ns=>{
      const ath=nextState.teams.find(t=>t.id===ns.teamId);
      const ev=nextState.events.find(e=>e.id===ns.eventId);
      if(ath&&ev) showToast('🏅 Nouveau score',`${(ath.lastName||'').toUpperCase()} ${ath.firstName||''} · ${ZM[ev.id]?.label||ev.name}`);
    });
  }
  prevScoreSnapshot = snapshot;
}

function showToast(title, desc){
  const wrap=document.getElementById('toast');
  const el=document.createElement('div');
  el.className='toast-item';
  el.innerHTML=`<div class="toast-icon">🏅</div><div class="toast-body"><div class="toast-title">${title}</div><div class="toast-desc">${desc}</div></div>`;
  wrap.appendChild(el);
  setTimeout(()=>{
    el.classList.add('out');
    setTimeout(()=>el.remove(),350);
  },4000);
}

/* ── FULLSCREEN ────────────────────────────────────────────────── */
document.getElementById('fsBtn')?.addEventListener('click',()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});
document.getElementById('testBtn')?.addEventListener('click',()=>{
  // Construit un faux départ avec les vrais athlètes du state
  const athletes = state?.teams?.slice(0,2) || [{lastName:'TEST',firstName:'Athlète',category:'ATHX',gender:'Homme'}];
  const fakeEntries = [{
    heat: 99,
    athletes,
    eventId: 'ev_strength',
    ev: state?.events?.find(e=>e.id==='ev_strength'),
    zs: nowMin() + 10/60,
    ze: nowMin() + 30,
  }];
  _depShown.delete('99_ev_strength'); // permettre le re-déclenchement
  showDep(fakeEntries, 20);
});

document.addEventListener('fullscreenchange',()=>{
  const btn=document.getElementById('fsBtn');
  if(btn) btn.textContent=document.fullscreenElement?'✕':'⛶';
});

/* ── ZONE TIMERS LIVE (chaque seconde, sans re-render) ─────────── */
function tickZoneTimers(){
  const nm = nowMin();
  document.querySelectorAll('.zone-card[data-ze]').forEach(card=>{
    const ze  = parseFloat(card.dataset.ze);
    const zd  = parseFloat(card.dataset.zd);
    const zc  = card.dataset.zcolor || 'var(--volt)';
    const rem = Math.max(0, Math.round((ze - nm) * 60));
    const remM = Math.floor(rem / 60);
    const remS = rem % 60;
    const color = rem <= 120 ? '#FF4444' : rem <= 300 ? '#FF9500' : zc;
    const timerEl = card.querySelector('[data-live-timer]');
    const progEl  = card.querySelector('[data-live-prog]');
    if(timerEl){
      timerEl.textContent = pad(remM)+':'+pad(remS);
      timerEl.style.color = color;
    }
    if(progEl){
      const elapsed = (zd * 60) - rem;
      const pct = Math.min(100, Math.max(0, elapsed / (zd * 60) * 100));
      progEl.style.width = pct.toFixed(1)+'%';
    }
  });
}

/* ── CLOCK ─────────────────────────────────────────────────────── */
function tickClock(){
  const d=new Date();
  document.getElementById('hdrClock').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  tickZoneTimers();
  checkDepartures();
}

/* ── RENDER ALL ────────────────────────────────────────────────── */
let state=null;
function render(){
  if(!state) return;
  renderTicker(state);
  renderZones(state);
  renderLeaderboard(state);
  renderTimeline(state);
  startLiveScrollers();
}

/* ── INIT ──────────────────────────────────────────────────────── */
async function init(){
  tickClock();
  setInterval(tickClock, 1000);
  setInterval(render, 30000);

  try {
    await AthxStore.whenCloudReady();
    state=AthxStore.loadState();
    document.getElementById('hdrSync').textContent='Cloud · OK';
  } catch(e){
    state=AthxStore.loadState();
    document.getElementById('hdrSync').textContent='Hors ligne';
  }

  // Nom + date de compétition dans le header
  const cfg = state?.config || {};
  const dateStr = cfg.date;
  let compLabel = cfg.competitionName || 'ATHX Epicure';
  if (dateStr) {
    const d = new Date(dateStr + 'T12:00:00'); // midi pour éviter les décalages TZ
    const today = new Date().toISOString().slice(0,10);
    const isToday = today === dateStr;
    const fmtDate = d.toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'short' });
    compLabel += ` · ${fmtDate}`;
    // Indicateur si pas le bon jour
    if (!isToday) {
      const isPast = today > dateStr;
      document.getElementById('hdrComp').style.color = isPast ? '#888' : '#60A5FA';
      compLabel += isPast ? ' (terminée)' : ' (à venir)';
    } else {
      document.getElementById('hdrComp').style.color = '';
    }
  }
  document.getElementById('hdrComp').textContent = compLabel;
  prevScoreSnapshot = JSON.stringify((state?.scores||[]).map(s=>({t:s.teamId,e:s.eventId,v:s.rawValue??s.performance})));

  const loader=document.getElementById('loader');
  loader.classList.add('hidden');
  setTimeout(()=>{ loader.style.display='none'; document.getElementById('app').style.display='grid'; },600);

  render();

  setInterval(async()=>{
    try {
      const next=await AthxStore.pullRemote();
      checkNewScores(next);
      state=next;
      const t=new Date();
      document.getElementById('hdrSync').textContent=`Cloud · ${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
      render();
    } catch(_){ document.getElementById('hdrSync').textContent='Erreur cloud'; }
  }, 20000);
}

window.addEventListener('athx:remote-sync', e=>{ if(e.detail.status==='success'){ state=AthxStore.loadState(); render(); } });
window.addEventListener('DOMContentLoaded', init);
</script>
