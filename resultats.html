<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ATHX Epicure – Résultats Live</title>
  <link rel="stylesheet" href="./assets/css/styles.css"/>
  <style>
    /* ── Layout ── */
    .results-wrap {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border-md);
      background: var(--raised);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      font-family: var(--mono);
      cursor: pointer;
      transition: all .15s;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .filter-btn:hover  { border-color: var(--border-lg); color: var(--text); background: var(--card-2); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #121212; box-shadow: 0 0 12px rgba(198,255,0,.2); }

    .sync-badge {
      margin-left: auto;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sync-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ok);
      animation: syncPulse 2s ease-in-out infinite;
    }
    @keyframes syncPulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Group header ── */
    .group-hdr {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0 8px;
      margin-top: 12px;
      border-bottom: 2px solid var(--border);
    }
    .group-hdr:first-child { margin-top: 0; }
    .group-pill {
      font-size: 11px; font-weight: 800;
      font-family: var(--mono); letter-spacing: .06em;
      text-transform: uppercase;
      padding: 4px 12px; border-radius: 20px;
      border: 1px solid currentColor;
    }
    .group-sub { font-size: 13px; color: var(--muted); font-weight: 500; }
    .group-count { margin-left: auto; font-size: 11px; color: var(--faint); font-family: var(--mono); }

    /* ── Results table ── */
    .res-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .res-table thead { border-bottom: 1px solid var(--border); }
    .res-table th {
      padding: 8px 12px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); font-family: var(--mono);
      background: var(--raised);
      white-space: nowrap;
      text-align: left;
    }
    .res-table th.ev-col { text-align: center; }
    .res-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      color: var(--text);
    }
    .res-table tbody tr:last-child td { border-bottom: none; }
    .res-table tbody tr { transition: background .15s; }
    .res-table tbody tr:hover td { background: var(--card-2); }

    /* Flash animation when new score arrives */
    @keyframes scoreFlash {
      0%  { background: rgba(198,255,0,.25); }
      100%{ background: transparent; }
    }
    .score-flash { animation: scoreFlash .8s ease forwards; }

    /* ── Rank column ── */
    .col-rank {
      width: 52px; text-align: center;
      font-family: var(--mono); font-size: 16px; font-weight: 800;
    }
    .col-rank.r1 { color: #FFD700; }
    .col-rank.r2 { color: #B0B0B0; }
    .col-rank.r3 { color: #CD7F32; }
    .col-rank.rn { color: var(--muted); font-size: 13px; }

    /* ── Athlete name column ── */
    .col-name { min-width: 160px; }
    .ath-last  { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }
    .ath-first { font-size: 12px; color: var(--muted); font-weight: 400; }
    .ath-cat   {
      display: inline-flex; align-items: center;
      padding: 2px 7px; border-radius: 10px;
      font-size: 9px; font-weight: 700; font-family: var(--mono);
      text-transform: uppercase; letter-spacing: .04em;
      margin-top: 3px;
    }
    .ac-lite { background: rgba(96,165,250,.15); color: #60A5FA; }
    .ac-athx { background: rgba(198,255,0,.1); color: var(--volt); }
    .ac-pro  { background: rgba(255,107,107,.15); color: #FF6B6B; }

    /* ── Score cells ── */
    .col-ev { text-align: center; min-width: 100px; }
    .score-val {
      font-family: var(--mono); font-size: 14px; font-weight: 700;
      color: var(--volt);
    }
    .score-rank {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      display: block; margin-top: 2px;
    }
    .score-best .score-rank { color: var(--volt); }
    .score-dnf { font-family: var(--mono); font-size: 12px; color: var(--danger); }
    .score-empty { color: var(--faint); font-size: 18px; }

    /* ── Total column ── */
    .col-total {
      font-family: var(--mono); font-size: 17px; font-weight: 800;
      color: var(--volt); text-align: right; white-space: nowrap;
    }
    .col-total .total-sub { font-size: 10px; color: var(--muted); display: block; font-weight: 400; }
    .col-total.no-total { color: var(--faint); font-size: 13px; }

    /* ── Heat badge ── */
    .heat-badge {
      font-family: var(--mono); font-size: 11px;
      color: var(--muted); white-space: nowrap;
    }

    /* ── Zone column header icons ── */
    .ev-hdr-icon { font-size: 14px; display: block; }
    .ev-hdr-name { font-size: 9px; }

    /* ── Live indicator ── */
    .live-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,68,68,.12); border: 1px solid rgba(255,68,68,.3);
      border-radius: 20px; padding: 2px 9px;
      font-size: 10px; font-weight: 700; font-family: var(--mono);
      color: #FF4444; letter-spacing: .06em;
    }
    .live-chip-dot { width: 5px; height: 5px; border-radius: 50%; background: #FF4444; animation: syncPulse 1s ease-in-out infinite; }

    /* ── Empty state ── */
    .empty-msg { text-align: center; padding: 48px 0; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <header><h1>ATHX · Epicure</h1><nav class="menu">
      <a href="./index.html">Accueil</a>
      <a href="./tv.html" target="_blank" rel="noopener noreferrer">📺 Dashboard TV</a>
      <a href="./equipes.html">Équipes</a>
      <a href="./planning.html">Planning heats</a>
      <a href="./epreuves.html">Épreuves</a>
      <a href="./scores.html">Saisie scores</a>
      <a href="./classement.html">Classement</a>
      <a class="active" href="./resultats.html">Résultats Live</a>
      <a href="./ops.html">Ops</a>
    </nav>
  </header>

  <main>
    <div class="toolbar">
      <span class="live-chip"><span class="live-chip-dot"></span>LIVE</span>
      <button class="filter-btn active" data-cat="all">Tous</button>
      <button class="filter-btn" data-cat="Lite">Lite</button>
      <button class="filter-btn" data-cat="ATHX">ATHX</button>
      <button class="filter-btn" data-cat="Pro">Pro</button>
      <div class="sync-badge">
        <div class="sync-dot"></div>
        <span id="syncStatus">Connexion…</span>
      </div>
    </div>

    <div id="resultsWrap" class="results-wrap"></div>
  </main>

  <script src="./assets/js/data.js"></script>
  <script>
    const ZONE_META = {
      ev_warmup:    { color:'#FF6B35', icon:'🔥', short:'Warm-Up'   },
      ev_strength:  { color:'#FF4444', icon:'🏋️', short:'Strength'  },
      ev_refuel:    { color:'#00D4AA', icon:'💧', short:'Refuel'     },
      ev_endurance: { color:'#C6FF00', icon:'🏃', short:'Endurance' },
      ev_recovery:  { color:'#9B5DE5', icon:'⚡', short:'Recovery'  },
      ev_metcon:    { color:'#C6FF00', icon:'⏱️', short:'MetCon X'  },
    };

    let activeCat = 'all';
    let lastScores = {}; // teamId+eventId -> value, pour détecter les nouveaux scores

    function pad(n){ return String(Math.floor(Math.abs(n))).padStart(2,'0'); }

    function fmtScore(sc, ev){
      if(!sc) return null;
      if(sc.dnf) return { val:'DNF', raw:null, isDnf:true };
      const raw = sc.rawValue ?? sc.performance;
      if(raw==null||raw==='') return null;
      if(ev.scoreUnit==='s'){
        const v = AthxStore.parseScoreValue(String(raw));
        if(v==null) return { val:String(raw), raw:v };
        return { val:`${pad(v/60)}:${pad(v%60)}`, raw:v };
      }
      return { val:String(raw)+(ev.scoreUnit?' '+ev.scoreUnit:''), raw:parseFloat(raw)||0 };
    }

    function catCls(c){ return c==='Lite'?'ac-lite':c==='Pro'?'ac-pro':'ac-athx'; }
    function catColor(c){ return c==='Lite'?'#60A5FA':c==='Pro'?'#FF6B6B':'#C6FF00'; }

    function render(state){
      const ranking    = AthxStore.getRanking(state);
      const scoredEvs  = state.events.filter(e=>e.scored);
      const heatSched  = AthxStore.buildHeatSchedule(state);

      // Heat lookup
      const heatOf = {};
      heatSched.forEach(({heat,athletes})=>athletes.forEach(a=>{ heatOf[a.id]=heat; }));

      const ORDER = ['Lite|Femme','Lite|Homme','ATHX|Femme','ATHX|Homme','Pro|Femme','Pro|Homme'];
      const groups = {};
      ORDER.forEach(k=>{ groups[k]=[]; });
      ranking.forEach(r=>{
        const k = `${r.team.category}|${r.team.gender}`;
        if(groups[k]) groups[k].push(r);
      });

      // Filter
      const filtered = ORDER.filter(k=>{
        if(!groups[k]?.length) return false;
        if(activeCat==='all') return true;
        return k.startsWith(activeCat+'|');
      });

      if(!filtered.length){
        document.getElementById('resultsWrap').innerHTML='<div class="empty-msg">Aucun athlète enregistré.</div>';
        return;
      }

      // Per-group best rank per event (to highlight)
      const bestRankInGroup = {}; // groupKey -> eventId -> rank
      filtered.forEach(k=>{
        bestRankInGroup[k]={};
        scoredEvs.forEach(ev=>{
          const ranks = groups[k].map(r=>r.eventRanks.find(x=>x.eventId===ev.id)?.rank).filter(x=>x!=null);
          if(ranks.length) bestRankInGroup[k][ev.id]=Math.min(...ranks);
        });
      });

      const newScores = {};
      state.scores.forEach(s=>{ newScores[s.teamId+'|'+s.eventId]=s.rawValue??s.performance; });

      let html = '';
      filtered.forEach(k=>{
        const [cat,gend] = k.split('|');
        const col = catColor(cat);
        const evCols = scoredEvs.map(ev=>{
          const meta = ZONE_META[ev.id]||{icon:'•',short:ev.name};
          return `<th class="ev-col" style="color:${meta.color}">
            <span class="ev-hdr-icon">${meta.icon}</span>
            <span class="ev-hdr-name">${meta.short}</span>
          </th>`;
        }).join('');

        const rows = groups[k].map((r,i)=>{
          const scored = r.scoredCount>0;
          const posNum = scored ? i+1 : null;
          const posClass = posNum===1?'r1':posNum===2?'r2':posNum===3?'r3':'rn';
          const medal = scored&&posNum<=3 ? ['🥇','🥈','🥉'][posNum-1] : (posNum||'—');
          const heat = heatOf[r.team.id];

          const scoreCells = scoredEvs.map(ev=>{
            const sc = state.scores.find(s=>s.teamId===r.team.id&&s.eventId===ev.id);
            const fmt = fmtScore(sc,ev);
            const er = r.eventRanks.find(x=>x.eventId===ev.id);
            const isBest = er?.rank!=null && er.rank===bestRankInGroup[k][ev.id];
            const scoreKey = r.team.id+'|'+ev.id;
            const isNew = lastScores[scoreKey]!==undefined && lastScores[scoreKey]!==newScores[scoreKey];

            let inner='';
            if(!fmt){
              inner=`<span class="score-empty">·</span>`;
            } else if(fmt.isDnf){
              inner=`<span class="score-dnf">DNF</span>`;
            } else {
              inner=`
                <span class="score-val">${fmt.val}</span>
                ${er?.rank!=null?`<span class="score-rank">#${er.rank}</span>`:''}`;
            }
            return `<td class="col-ev${isBest?' score-best':''}${isNew?' score-flash':''}">${inner}</td>`;
          }).join('');

          const ln = (r.team.lastName||r.team.name||'').toUpperCase();
          const fn = r.team.firstName||'';

          return `
            <tr>
              <td class="col-rank ${posClass}">${medal}</td>
              <td class="col-name">
                <div class="ath-last">${ln} <span class="ath-first">${fn}</span></div>
                <div>
                  <span class="ath-cat ${catCls(r.team.category)}">${r.team.category}</span>
                  ${heat?`<span class="heat-badge" style="margin-left:6px">H${heat}</span>`:''}
                </div>
              </td>
              ${scoreCells}
              <td class="col-total${scored?'':' no-total'}">
                ${scored ? `${r.total}<span class="total-sub">pts</span>` : '—'}
              </td>
            </tr>`;
        }).join('');

        html+=`
          <div class="group-hdr">
            <span class="group-pill" style="color:${col};border-color:${col}40;background:${col}10">${cat}</span>
            <span class="group-sub">${gend}</span>
            <span class="group-count">${groups[k].length} athlète${groups[k].length>1?'s':''}</span>
          </div>
          <table class="res-table">
            <thead><tr>
              <th style="width:52px">#</th>
              <th>Athlète</th>
              ${evCols}
              <th style="text-align:right">Total</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>`;
      });

      document.getElementById('resultsWrap').innerHTML = html;

      // Mémoriser les scores pour détecter les prochains changements
      Object.assign(lastScores, newScores);
    }

    // ── Filtres ──────────────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        activeCat = btn.dataset.cat;
        if(window._state) render(window._state);
      });
    });

    // ── Init + auto-refresh ──────────────────────────────────────
    async function init(){
      try {
        await AthxStore.whenCloudReady();
        window._state = AthxStore.loadState();
        document.getElementById('syncStatus').textContent = 'Connecté · en direct';
      } catch(e){
        window._state = AthxStore.loadState();
        document.getElementById('syncStatus').textContent = 'Hors ligne';
      }
      render(window._state);

      // Refresh toutes les 15s
      setInterval(async()=>{
        try {
          window._state = await AthxStore.pullRemote();
          const t=new Date();
          document.getElementById('syncStatus').textContent =
            `Mis à jour ${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
          render(window._state);
        } catch(e){
          document.getElementById('syncStatus').textContent = 'Erreur cloud';
        }
      }, 15000);
    }

    window.addEventListener('athx:remote-sync', e=>{
      if(e.detail.status==='success'){
        window._state = AthxStore.loadState();
        render(window._state);
      }
    });

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
